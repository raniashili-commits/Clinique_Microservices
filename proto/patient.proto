syntax = "proto3";

package patient;

message Patient {
  string id = 1;
  string nom = 2;
  string prenom = 3;
  string email = 4;
  string telephone = 5;
  string dateNaissance = 6;
}

message CreatePatientRequest {
  string nom = 1;
  string prenom = 2;
  string email = 3;
  string telephone = 4;
  string dateNaissance = 5;
}

message GetPatientRequest {
  string id = 1;
}

message GetAllPatientsRequest {}

message PatientResponse {
  Patient patient = 1;
}

message PatientsListResponse {
  repeated Patient patients = 1;
}

message UpdatePatientRequest {
  string id = 1;
  string nom = 2;
  string prenom = 3;
  string email = 4;
  string telephone = 5;
}

message DeletePatientRequest {
  string id = 1;
}

message DeletePatientResponse {
  bool success = 1;
  string message = 2;
}

service PatientService {
  rpc CreatePatient (CreatePatientRequest) returns (PatientResponse);
  rpc GetPatient (GetPatientRequest) returns (PatientResponse);
  rpc GetAllPatients (GetAllPatientsRequest) returns (PatientsListResponse);
  rpc UpdatePatient (UpdatePatientRequest) returns (PatientResponse);
  rpc DeletePatient (DeletePatientRequest) returns (DeletePatientResponse);
}